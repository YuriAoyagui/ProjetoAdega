<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/listar.css">
    <link rel="stylesheet" href="/css/relatorio.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Relatório Mensal - Adega</title>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-icon" title="Voltar ao Início">
            <i class="fas fa-home"></i>
        </a>
        <h1 class="nav-title">📊 RELATÓRIO MENSAL</h1>
        <div style="width: 40px;"></div>
    </nav>

    <div class="container">
        <div class="resumo-cards">
            <div class="card-info">
                <h3>Total de Itens (Mês)</h3>
                <p id="total-itens">0</p>
            </div>
            <div class="card-info">
                <h3>Investimento Total (Mês)</h3>
                <p id="total-valor">R$ 0,00</p>
            </div>
        </div>

        <main class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Quantidade</th>
                        <th>Preço Unit.</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    </tbody>
            </table>
        </main>
    </div>
    <script src="/js/relatorio.js"></script>
</body>
</html>
