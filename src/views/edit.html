<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/edit.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Editar Produto - Adega</title>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="icon-home" title="Voltar ao Início">
            <i class="fas fa-home"></i>
        </a>
    </nav>

    <main class="container">
        <h1>EDITAR PRODUTO</h1>
        <form id="formEdicao" method="POST" class="card-form">
            <section class="input-group">
                <label for="nome">Nome do Produto *</label>
                <input type="text" id="nome" name="nome" required>
            </section>

            <section class="row">
                <section class="input-group">
                    <label for="categoria">Categoria *</label>
                    <select id="categoria" name="categoria" required>
                        <option value="Vinhos">Vinhos</option>
                        <option value="Espumantes">Espumantes</option>
                        <option value="Destilados">Destilados</option>
                        <option value="Cervejas">Cervejas</option>
                        <option value="Não alcoólicos">Não alcoólicos</option>
                        <option value="Outros">Outros</option>
                    </select>
                </section>
                <section class="input-group">
                    <label for="safra">Safra/Ano</label>
                    <input type="text" id="safra" name="safra">
                </section>
            </section>

            <section class="row">
                <section class="input-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" id="quantidade" name="quantidade">
                </section>
                <section class="input-group">
                    <label for="preco">Preço de Compra (R$)</label>
                    <input type="number" id="preco" name="preco" step="0.01">
                </section>
            </section>

            <section class="button-container">
                <button type="submit" class="btn-save">Salvar Alterações</button>
                <button type="button" class="btn-cancel" onclick="window.location.href='listar.html'">Cancelar</button>
            </section>
        </form>
    </main>
<script src="/js/edit.js"></script>
</body>
</html>
