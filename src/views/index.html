<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍷%3C/text%3E%3C/svg%3E">
    <title>ADEGA - Controle de Estoque</title>
</head>
<body>
     <nav class="navbar">
        <a href="/" class="nav-icon">
            <i class="fa-solid fa-house"></i>
        </a>
    </nav>

    <main class="dashboard">
        <header class="dashboard-header">
            <h1>CONTROLE DE ESTOQUE</h1>
        </header>

        <section class="menu-grid">
            <article class="card">
                <a href="/cadastro">
                    <svg class="icon-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 11V5a2 2 0 0 0-2-2H11a2 2 0 0 0-2 2v6l-1 2v7a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-7l-1-2Z"/>
                        <path d="M12 18h.01M18 5v6M15 8h6"/>
                    </svg>
                    <h2>Cadastrar Produtos</h2>
                </a>
            </article>

            <article class="card">
                <a href="/listar">
                    <svg class="icon-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"/>
                        <path d="M12 11h4M12 16h4M8 11h.01M8 16h.01"/>
                    </svg>
                    <h2>Listar Produtos</h2>
                </a>
            </article>

            <article class="card">
                <a href="/reposicao">
                    <svg class="icon-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    <h2>Alerta de Reposição</h2>
                </a>
            </article>

            <article class="card">
                <a href="/historico">
                    <svg class="icon-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                        <path d="M12 7v5l4 2"/>
                    </svg>
                    <h2>Histórico de Entrada</h2>
                </a>
            </article>

            <article class="card">
                <a href="/relatorio">
                    <svg class="icon-orange" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <line x1="10" y1="9" x2="8" y2="9"/>
                    </svg>
                    <h2>Relatório Mensal</h2>
                </a>
            </article>
        </section>
    </main>
</body>
</html>
