<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>ADEGA - Cadastrar Produto</title>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-icon" title="Voltar ao Início">
            <i class="fa-solid fa-house"></i>
        </a>
    </nav>

    <main class="dashboard-container">
        <section class="form-card">
            <header class="form-header">
                <h1>CADASTRAR NOVO PRODUTO</h1>
                <p>Preencha os dados abaixo para adicionar ao estoque</p>
            </header>

            <form action="/cadastrar" method="POST">
                <div class="form-group">
                    <label for="nome">Nome do Produto</label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: Vinho tinto Cabernet" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" name="categoria">
                            <option value="Vinhos">Vinhos</option>
                            <option value="Espumantes">Espumantes</option>
                            <option value="Destilados">Destilados</option>
                            <option value="Cervejas">Cervejas</option>
                            <option value="Não alcoólicos">Não alcoólicos</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="safra">Safra/Ano</label>
                        <input type="number" id="safra" name="safra" placeholder="2021" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="quantidade">Quantidade</label>
                        <input type="number" id="quantidade" name="quantidade" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="preco">Preço de Compra (R$)</label>
                        <input type="number" id="preco" name="preco" step="0.01" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn-secondary">Limpar</button>
                    <button type="submit" class="btn-primary">Salvar Produto</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
